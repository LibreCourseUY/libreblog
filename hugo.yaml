baseURL: "https://blog.librecourse.uy"
title: "🇺🇾 LibreCourseUY"
theme: ["PaperMod"]

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

languages:
  en:
    languageName: English
    weight: 1

params:
  env: production
  description: "LibreCourseUY Dev Log"
  mainSections: ["codenights"]
  defaultTheme: auto
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  homeInfoParams:
    Title: ""
    Content: ""
  socialIcons:
    - name: github
      url: "https://github.com/LibreCourseUY"
    - name: discord
      url: "https://discord.gg/ENTX7nQ9Cs"
menu:
  main:
    - name: Home
      url: /
      weight: 1
    - name: Codenights
      url: /codenights/
      weight: 2
    - name: TL:DR
      url: /tldr/
      weight: 2
    - name: Projects
      url: /projects/
      weight: 4

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true